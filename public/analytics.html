<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Analysis | IT Asset Management</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- React & Tailwind for Analytics Widget -->
    <script>
        tailwind.config = { corePlugins: { preflight: false } }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.6.2/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.2/umd/Recharts.js"></script>

    <style>
        /* Override tailwind conflicting with native layout */
        .dashboard-layout {
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg);
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-content {
            padding: 30px;
            overflow-y: auto;
            flex: 1;
        }

        .glassmorphism {
            background: rgba(10, 30, 60, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(0, 210, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Reset tw reset inside #analytics-root */
        #analytics-root h2 {
            margin: 0;
            font-size: inherit;
            font-weight: inherit;
        }
    </style>
</head>

<body>
    <div class="dashboard-layout">
        <!-- Sidebar identical to dashboard.html -->
        <aside class="sidebar" id="sidebar">
            <button class="sidebar-close-btn" onclick="document.getElementById('sidebar').classList.remove('active')"><i
                    class="fas fa-times"></i></button>
            <h2>IT ASSET PRO</h2>
            <nav style="flex: 1;">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a href="analytics.html" class="nav-item active"><i class="fas fa-brain"></i> Data Analysis</a>
                <a href="inventory.html" class="nav-item"><i class="fas fa-laptop-code"></i> Asset Inventory</a>
                <a href="materials.html" class="nav-item"><i class="fas fa-boxes-stacked"></i> Material Stock</a>
                <a href="logs.html" class="nav-item"><i class="fas fa-file-invoice"></i> Issuance Logs</a>
                <a href="settings.html" class="nav-item"><i class="fas fa-users-gear"></i> User Settings</a>
            </nav>
            <div style="margin-top: auto; padding: 25px; background: rgba(255,255,255,0.04); border-radius: 20px;">
                <p id="userName" style="font-weight: 600; color: var(--primary); margin-bottom: 5px;">Admin User</p>
                <p id="userRole" style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 20px;">Analytics Role</p>
                <button onclick="logout()"
                    style="width:100%; background:rgba(255,75,43,0.1); border:1px solid var(--error); color:var(--error); padding:10px; border-radius:30px; cursor:pointer; font-weight:600;">Sign
                    Out</button>
            </div>
        </aside>

        <!-- Content Wrapper -->
        <div class="content-wrapper">
            <!-- Top Nav -->
            <nav class="top-nav">
                <div class="logo-section">
                    <button class="mobile-toggle-btn"
                        onclick="document.getElementById('sidebar').classList.add('active')"><i
                            class="fas fa-bars"></i></button>
                    <img src="assets/logo.png" alt="TASL" onerror="this.style.display='none'">
                    <h2>ANALYTICS INTERNSHIP MODULE</h2>
                </div>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <span id="lastSyncedTime" style="font-size: 0.75rem; opacity: 0.5; font-style: italic;">Data Sync:
                        Real-time</span>
                    <button onclick="exportDashboardPDF()" class="btn-primary"
                        style="background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); border:none; padding:10px 20px; border-radius:8px; color:white; font-weight:bold; cursor:pointer; box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4); transition: 0.3s;">
                        <i class="fas fa-file-pdf"></i> Export AI PDF Report
                    </button>
                </div>
            </nav>

            <!-- Main Content Area where React renders -->
            <main class="main-content" style="background: transparent; padding:0; position:relative;">
                <div id="error-overlay"
                    style="display:none; position:absolute; top:0; left:0; right:0; background:red; color:white; padding:20px; z-index:9999; font-weight:bold;">
                </div>
                <div id="analytics-root" class="h-full"></div>
            </main>
        </div>
    </div>
    <script>
        function exportDashboardPDF() {
            const element = document.getElementById('analytics-root');
            const opt = {
                margin: [-5, 0, 0, 0],
                filename: 'IT_Asset_Intelligence_Report.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, useCORS: true, logging: false, backgroundColor: '#0a3d62' },
                jsPDF: { unit: 'mm', format: 'a3', orientation: 'landscape' }
            };

            // Show scanning state
            const btn = document.querySelector('.btn-primary');
            const oldText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating PDF...';

            html2pdf().set(opt).from(element).save().then(() => {
                btn.innerHTML = oldText;
            });
        }

        window.addEventListener('error', function (event) {
            const err = document.getElementById('error-overlay');
            err.style.display = 'block';
            err.innerHTML += '<p>ERROR: ' + event.message + '<br>' + event.filename + ':' + event.lineno + '</p>';
        });
        window.addEventListener('unhandledrejection', function (event) {
            const err = document.getElementById('error-overlay');
            err.style.display = 'block';
            err.innerHTML += '<p>PROMISE REJECTION: ' + (event.reason ? event.reason.message : 'Unknown') + '</p>';
        });
    </script>
    </script>

    <!-- React Dashboard Injection -->
    <script>
        if (window.Babel) {
            window.Babel.registerPreset('react-classic', {
                presets: [[window.Babel.availablePresets['react'], { runtime: 'classic' }]]
            });
        }
    </script>
    <script type="text/babel" data-presets="react-classic">
        /** @jsx React.createElement */
        const { useState, useEffect } = React;
        const Recharts = window.Recharts || window.recharts || {};
        const { ResponsiveContainer, PieChart, Pie, Cell, Tooltip, Legend, BarChart, Bar, XAxis, YAxis, CartesianGrid, AreaChart, Area } = Recharts;
        const COLORS = ['#10B981', '#F59E0B', '#EF4444', '#6B7280', '#3B82F6'];

        function AnalyticsApp() {
            const [kpis, setKpis] = useState(null);
            const [filterData, setFilterData] = useState([]);

            const [brand, setBrand] = useState('');
            const [status, setStatus] = useState('');
            const [department, setDepartment] = useState('');
            const [search, setSearch] = useState('');

            const [prescriptionModel, setPrescriptionModel] = useState('');
            const [prescriptionResult, setPrescriptionResult] = useState(null);

            useEffect(() => {
                fetchKPIs();
                fetchFilteredAssets();
            }, []);

            const fetchKPIs = async () => {
                try {
                    const res = await fetch('/api/analytics/kpis');
                    const json = await res.json();
                    if (json.success) setKpis(json.data);
                } catch (err) { console.error('Failed to load KPIs'); }
            };

            const fetchFilteredAssets = async () => {
                try {
                    const query = new URLSearchParams({ status, department, search }).toString();
                    const res = await fetch(`/api/analytics/filter?${query}`);
                    const json = await res.json();
                    if (json.success) setFilterData(json.data);
                } catch (err) { console.error('Failed to filter assets'); }
            };

            const checkPrescription = async () => {
                if (!prescriptionModel) return;
                try {
                    const res = await fetch('/api/analytics/prescriptive-check', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ requestedModel: prescriptionModel })
                    });
                    const json = await res.json();
                    setPrescriptionResult(json);
                } catch (err) { console.error('Failed prescriptive check'); }
            };

            const pieData = kpis && kpis.statusCounts ? [
                { name: 'Active', value: kpis.statusCounts.Active || 0 },
                { name: 'Idle', value: kpis.statusCounts['In-Store'] || kpis.statusCounts.Idle || 0 },
                { name: 'In-Repair', value: kpis.statusCounts['In-Repair'] || kpis.statusCounts.Repair || 0 },
                { name: 'Scrap', value: kpis.statusCounts.Scrap || 0 },
            ].filter(d => d.value > 0) : [];

            const WidgetCard = ({ title, value, subtitle, colorClass }) => (
                <div className={`p-6 rounded-2xl glassmorphism ${colorClass}`}>
                    <h3 className="text-gray-300 text-xs font-bold uppercase tracking-wider">{title}</h3>
                    <div className="mt-2 text-3xl font-extrabold text-white">{value}</div>
                    {subtitle && <p className="mt-1 text-sm text-gray-400 font-medium">{subtitle}</p>}
                </div>
            );

            return (
                <div className="p-8 max-w-7xl mx-auto space-y-8 font-sans">
                    <div className="bg-gradient-to-r from-[rgba(0,210,255,0.2)] to-[rgba(10,61,98,0.5)] border border-[rgba(0,210,255,0.3)] p-8 rounded-3xl text-white shadow-lg relative overflow-hidden backdrop-blur-md">
                        <div className="relative z-10">
                            <h1 className="text-4xl font-extrabold mb-2 text-[#00d2ff]" style={{ lineHeight: 1 }}>Data Analysis Intelligence</h1>
                            <p className="text-gray-200 text-lg">Machine Learning Internship Ready Module. Server-side aggregations for optimizing CapEx via internal resource transfers.</p>
                        </div>
                        <div className="absolute top-0 right-0 opacity-20 text-[#00d2ff]">
                            <i className="fas fa-brain fa-10x"></i>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <WidgetCard title="Total Capex Exps." value={kpis ? `$${kpis.totalInvestment.toLocaleString()}` : "$0"} colorClass="border-l-4 border-blue-500" />
                        <WidgetCard title="Functional Yield" value={kpis ? kpis.activeAssets : "0"} colorClass="border-l-4 border-green-500" />
                        <WidgetCard title="Dormant Liability" value={kpis ? kpis.idleAssets : "0"} colorClass="border-l-4 border-amber-500" />
                        <WidgetCard title="Critical Warranty" value={kpis ? kpis.pendingExpiryCount : "0"} subtitle="Expiring within 30 days" colorClass="border-l-4 border-red-500" />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="glassmorphism p-6 rounded-2xl">
                            <h2 className="text-lg font-bold mb-4 text-[#00d2ff]" style={{ lineHeight: 1.5 }}>Asset Distribution Logic</h2>
                            <div className="h-64">
                                {pieData.length > 0 ? (
                                    <ResponsiveContainer width="100%" height="100%">
                                        <PieChart>
                                            <Pie data={pieData} cx="50%" cy="50%" innerRadius={60} outerRadius={80} paddingAngle={5} dataKey="value">
                                                {pieData.map((e, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
                                            </Pie>
                                            <Tooltip contentStyle={{ background: 'rgba(10,61,98,0.9)', border: '1px solid rgba(0,210,255,0.2)', color: '#fff', borderRadius: '10px' }} />
                                            <Legend verticalAlign="bottom" height={36} wrapperStyle={{ color: '#fff' }} />
                                        </PieChart>
                                    </ResponsiveContainer>
                                ) : <div className="text-gray-400">Rendering...</div>}
                            </div>
                        </div>

                        <div className="glassmorphism p-6 rounded-2xl">
                            <h2 className="text-lg font-bold mb-4 text-[#00d2ff]" style={{ lineHeight: 1.5 }}>Department Allocation Metrics</h2>
                            <div className="h-64">
                                {kpis && kpis.deptExpenditures && kpis.deptExpenditures.length > 0 ? (
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={kpis.deptExpenditures}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="rgba(255,255,255,0.1)" />
                                            <XAxis dataKey="department" stroke="#ccc" tick={{ fill: '#ccc', fontSize: 12 }} />
                                            <YAxis stroke="#ccc" tick={{ fill: '#ccc', fontSize: 12 }} />
                                            <Tooltip cursor={{ fill: 'rgba(0,210,255,0.1)' }} contentStyle={{ background: 'rgba(10,61,98,0.9)', border: 'none', color: '#fff', borderRadius: '10px' }} />
                                            <Bar dataKey="totalCost" fill="#00d2ff" radius={[4, 4, 0, 0]} />
                                        </BarChart>
                                    </ResponsiveContainer>
                                ) : <div className="text-gray-400">Rendering...</div>}
                            </div>
                        </div>
                    </div>

                    <div className="glassmorphism p-6 md:p-8 rounded-2xl relative overflow-hidden">
                        <h2 className="text-2xl font-extrabold text-[#00d2ff] mb-2" style={{ lineHeight: 1.5 }}>Prescriptive Logic Analyst Bot</h2>
                        <p className="text-gray-300 text-sm mb-6">Type a model keyword below to analyze internal warehouse. Avoid triggering new Purchase Orders if internal assets are Idle.</p>

                        <div className="flex gap-4 max-w-3xl">
                            <input type="text" value={prescriptionModel} onChange={e => setPrescriptionModel(e.target.value)} placeholder="Dataset query (e.g., MacBook, Monitor, Dell)" className="flex-1 px-4 py-3 rounded-xl border border-[rgba(0,210,255,0.3)] outline-none focus:ring-2 focus:ring-[#00d2ff] font-medium bg-[rgba(10,30,60,0.5)] text-white placeholder-gray-400" />
                            <button onClick={checkPrescription} className="bg-[#00d2ff] hover:bg-[#00b0d0] text-black px-8 py-3 rounded-xl font-bold transition">Compute</button>
                        </div>

                        {prescriptionResult && (
                            <div className={`mt-6 p-5 rounded-xl border-l-4 bg-[rgba(10,30,60,0.5)] shadow-sm ${prescriptionResult.recommendation === 'CROSS_TRANSFER' ? 'border-green-400' : 'border-[#00d2ff]'}`}>
                                <h3 className={`font-bold text-lg ${prescriptionResult.recommendation === 'CROSS_TRANSFER' ? 'text-green-400' : 'text-[#00d2ff]'}`}>
                                    {prescriptionResult.recommendation === 'CROSS_TRANSFER' ? '💡 ALGORITHM ALERT: EXECUTABLE CROSS-TRANSFER' : '🛒 PROCEED: PO CLEARANCE GRANTED'}
                                </h3>
                                <p className="text-sm mt-1 text-gray-300 font-medium">{prescriptionResult.message}</p>
                                {prescriptionResult.data && prescriptionResult.data.length > 0 && (
                                    <div className="mt-4 flex gap-2 flex-wrap">
                                        {prescriptionResult.data.map((asset, i) => (
                                            <span key={i} className="bg-[rgba(0,210,255,0.1)] px-3 py-1.5 rounded-md text-xs font-bold text-white border border-[rgba(0,210,255,0.2)]">
                                                ID: {asset.pc_name || asset.id} | {asset.model_name || '-'}
                                            </span>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="glassmorphism p-6 rounded-2xl lg:col-span-2">
                            <h2 className="text-lg font-bold mb-4 text-[#00d2ff]" style={{ lineHeight: 1.5 }}>Hardware Aging Trajectory (Refresh Cycles)</h2>
                            <div className="h-64">
                                {filterData.length > 0 ? (() => {
                                    const decades = filterData.reduce((acc, a) => {
                                        const y = a.purchaseDate ? new Date(a.purchaseDate).getFullYear() : 'Unknown';
                                        if (y !== 'Unknown') { acc[y] = (acc[y] || 0) + 1; }
                                        return acc;
                                    }, {});
                                    const areaData = Object.keys(decades).sort().map(k => ({ year: k, count: decades[k] }));
                                    return (
                                        <ResponsiveContainer width="100%" height="100%">
                                            <AreaChart data={areaData}>
                                                <defs>
                                                    <linearGradient id="colorCount" x1="0" y1="0" x2="0" y2="1">
                                                        <stop offset="5%" stopColor="#10B981" stopOpacity={0.8} />
                                                        <stop offset="95%" stopColor="#10B981" stopOpacity={0} />
                                                    </linearGradient>
                                                </defs>
                                                <XAxis dataKey="year" stroke="#ccc" tick={{ fill: '#ccc', fontSize: 12 }} />
                                                <YAxis stroke="#ccc" tick={{ fill: '#ccc', fontSize: 12 }} />
                                                <Tooltip contentStyle={{ background: 'rgba(10,61,98,0.9)', border: '1px solid rgba(0,210,255,0.2)', color: '#fff', borderRadius: '10px' }} />
                                                <Area type="monotone" dataKey="count" stroke="#10B981" fillOpacity={1} fill="url(#colorCount)" />
                                            </AreaChart>
                                        </ResponsiveContainer>
                                    );
                                })() : <div className="text-gray-400">Rendering Dataset...</div>}
                            </div>
                        </div>

                        <div className="glassmorphism p-6 rounded-2xl flex flex-col">
                            <h2 className="text-lg font-bold mb-4 text-[#ff4b2b]" style={{ lineHeight: 1.5 }}><i className="fas fa-exclamation-triangle mr-2"></i> Audit Warnings</h2>
                            <div className="flex-1 overflow-y-auto space-y-3" style={{ maxHeight: '250px' }}>
                                {filterData.filter(a => a.status === 'Scrap' || a.status === 'In-Repair').map((alert, i) => (
                                    <div key={i} className="p-3 bg-[rgba(255,75,43,0.1)] border border-[rgba(255,75,43,0.3)] rounded-xl flex items-center justify-between">
                                        <div>
                                            <p className="text-white text-sm font-bold">{alert.pc_name}</p>
                                            <p className="text-xs text-gray-300">Requires physical audit ({alert.status})</p>
                                        </div>
                                        <i className="fas fa-search text-[#ff4b2b] opacity-50"></i>
                                    </div>
                                ))}
                                {filterData.filter(a => a.status === 'Scrap' || a.status === 'In-Repair').length === 0 && (
                                    <p className="text-gray-400 text-sm mt-10 text-center">No critical audit warnings.</p>
                                )}
                            </div>
                        </div>
                    </div>

                    <div className="glassmorphism p-6 rounded-2xl">
                        <h2 className="text-xl font-bold text-[#00d2ff] mb-6" style={{ lineHeight: 1.5 }}>Data Inspection Layer</h2>
                        <div className="flex gap-4 mb-6">
                            <input type="text" placeholder="Search Query..." value={search} onChange={e => setSearch(e.target.value)} className="w-1/3 border border-[rgba(255,255,255,0.2)] p-3 rounded-xl focus:ring-2 bg-[rgba(255,255,255,0.05)] text-white placeholder-gray-400 outline-none focus:ring-[#00d2ff]" />
                            <select value={status} onChange={e => setStatus(e.target.value)} className="w-1/3 border border-[rgba(255,255,255,0.2)] p-3 rounded-xl focus:ring-2 bg-[#0a3d62] text-white outline-none focus:ring-[#00d2ff]">
                                <option value="">Filter Status...</option>
                                <option value="Active">Active</option>
                                <option value="In-Store">In-Store (Idle)</option>
                                <option value="In-Repair">Repairing</option>
                            </select>
                            <button onClick={fetchFilteredAssets} className="w-1/3 bg-[rgba(0,210,255,0.2)] border border-[#00d2ff] text-[#00d2ff] px-5 py-3 rounded-xl font-bold hover:bg-[rgba(0,210,255,0.3)] transition">Filter Dataset</button>
                        </div>

                        <div className="overflow-x-auto rounded-xl border border-[rgba(255,255,255,0.1)]">
                            <table className="min-w-full text-left text-sm whitespace-nowrap">
                                <thead className="bg-[rgba(255,255,255,0.05)] border-b border-[rgba(255,255,255,0.1)]">
                                    <tr>
                                        <th className="px-6 py-4 font-bold text-gray-300">TAG / PC N.</th>
                                        <th className="px-6 py-4 font-bold text-gray-300">MODEL IDENTIFIER</th>
                                        <th className="px-6 py-4 font-bold text-gray-300">DEPARTMENT</th>
                                        <th className="px-6 py-4 font-bold text-gray-300">LIFECYCLE</th>
                                        <th className="px-6 py-4 font-bold text-gray-300">CAPEX</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-[rgba(255,255,255,0.05)]">
                                    {filterData.map((item, idx) => (
                                        <tr key={idx} className="hover:bg-[rgba(255,255,255,0.02)] transition">
                                            <td className="px-6 py-4 font-mono text-gray-300">{item.pc_name || item.id}</td>
                                            <td className="px-6 py-4 font-semibold text-white">{item.model_name || '-'}</td>
                                            <td className="px-6 py-4 text-gray-300">{item.department || 'Not Assigned'}</td>
                                            <td className="px-6 py-4">
                                                <span className={`px-3 py-1 rounded-full text-xs font-bold border ${item.status === 'Active' ? 'bg-[rgba(16,185,129,0.1)] text-[#10B981] border-[#10B981]' :
                                                    item.status === 'In-Store' ? 'bg-[rgba(245,158,11,0.1)] text-[#F59E0B] border-[#F59E0B]' : 'bg-[rgba(255,255,255,0.1)] text-gray-300 border-[rgba(255,255,255,0.2)]'
                                                    }`}>{item.status || 'N/A'}</span>
                                            </td>
                                            <td className="px-6 py-4 font-medium text-[#00d2ff]">
                                                ${item.purchasePrice ? item.purchasePrice.toLocaleString() : '0'}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('analytics-root'));
        root.render(<AnalyticsApp />);
    </script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (user) {
            document.getElementById('userName').textContent = user.username;
            document.getElementById('userRole').textContent = `System ${user.role}`;
        }
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
